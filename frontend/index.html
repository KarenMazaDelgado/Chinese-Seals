<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <link rel="stylesheet" type="text/css" href="style.css" />
    <link rel="stylesheet" href="https://use.typekit.net/lgd2ata.css" />

    <title>Stamps</title>
    <style>
      .subtitle {
        margin: 6px;
      }

      /* Main scroll roadmap (index page) */
      .scroll-inline {
        width: 100%;
        height: clamp(320px, 64vh, 680px);
        margin-top: 12px;
      }

      .scroll-inline .scroll-roadmap-shell {
        height: 100%;
      }

      .scroll-inline-hint {
        text-align: center;
        font-family: "shantell-sans-bouncy", sans-serif;
        font-weight: 400;
        font-style: italic;
        font-size: 14px;
        color: #402725;
        margin-top: 10px;
        margin-bottom: 8px;
      }

      .scroll-roadmap-shell {
        position: relative;
        flex: 1;
        min-height: 0;
        width: 100%;
      }

      /* Non-clickable scroll hints (fading arrows) */
      .scroll-hint {
        position: absolute;
        top: 0;
        bottom: 0;
        width: min(84px, 18vw);
        z-index: 2;
        pointer-events: none;
        opacity: 0;
        transition: opacity 220ms ease;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "chantal", sans-serif;
        font-weight: 700;
        font-style: normal;
        font-size: 44px;
        color: rgba(245, 230, 211, 0.9);
        text-shadow: 0 1px 10px rgba(0, 0, 0, 0.55);
      }

      .scroll-hint::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to right,
          rgba(0, 0, 0, 0.55),
          rgba(0, 0, 0, 0)
        );
      }

      .scroll-hint span {
        position: relative;
        transform: translateY(-2px);
        opacity: 0.9;
        animation: hint-bob 1.35s ease-in-out infinite;
      }

      .scroll-hint.right::before {
        background: linear-gradient(
          to left,
          rgba(0, 0, 0, 0.55),
          rgba(0, 0, 0, 0)
        );
      }

      .scroll-hint.left {
        left: 0;
        padding-left: max(6px, env(safe-area-inset-left));
      }

      .scroll-hint.right {
        right: 0;
        padding-right: max(6px, env(safe-area-inset-right));
      }

      .scroll-roadmap-shell.hint-left .scroll-hint.left {
        opacity: 1;
        pointer-events: auto;
      }

      .scroll-roadmap-shell.hint-right .scroll-hint.right {
        opacity: 1;
        pointer-events: auto;
      }

      /* Click/tap the visible hints to pan */
      .scroll-hint {
        cursor: pointer;
      }

      .scroll-hint:active span {
        transform: translateY(-2px) scale(0.98);
      }

      @keyframes hint-bob {
        0%,
        100% {
          transform: translateY(-2px) translateX(0);
          opacity: 0.85;
        }
        50% {
          transform: translateY(-2px) translateX(6px);
          opacity: 1;
        }
      }

      .scroll-roadmap-viewport {
        position: absolute;
        inset: 0;
        overflow-x: auto;
        overflow-y: hidden;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
        scrollbar-color: rgba(232, 201, 107, 0.6) rgba(0, 0, 0, 0.2);
      }

      .scroll-roadmap-track {
        position: relative;
        display: inline-block;
        height: 100%;
      }

      .scroll-roadmap-track img {
        display: block;
        height: 100%;
        width: auto;
        max-width: none;
        margin: 0;
        user-select: none;
        pointer-events: none;
      }

      .stamp-hotspot {
        position: absolute;
        left: var(--hx);
        top: var(--hy);
        transform: translate(-50%, -50%);
        width: clamp(26px, 4.2vmin, 38px);
        height: clamp(26px, 4.2vmin, 38px);
        border-radius: 50%;
        border: 2px solid #402725;
        background: rgba(245, 230, 211, 0.92);
        box-shadow:
          0 0 0 2px rgba(245, 230, 211, 0.7),
          0 0 20px rgba(245, 230, 211, 0.35);
        cursor: pointer;
        text-decoration: none;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "chantal", sans-serif;
        font-weight: 700;
        font-style: normal;
        font-size: 12px;
        line-height: 1;
        color: #402725;
        z-index: 1;
        animation: hotspot-pulse 2.2s ease-in-out infinite;
      }

      .stamp-hotspot span {
        pointer-events: none;
        text-shadow: 0 0 4px rgba(255, 255, 255, 0.9);
      }

      .stamp-hotspot:focus-visible {
        outline: 3px solid #fff;
        outline-offset: 3px;
      }

      @keyframes hotspot-pulse {
        0%,
        100% {
          box-shadow:
            0 0 0 2px rgba(245, 230, 211, 0.7),
            0 0 14px rgba(245, 230, 211, 0.25);
        }
        50% {
          box-shadow:
            0 0 0 2px rgba(245, 230, 211, 0.85),
            0 0 26px rgba(245, 230, 211, 0.55);
        }
      }

      .quick-links-title {
        text-align: center;
        font-family: "shantell-sans-bouncy", sans-serif;
        font-size: 1rem;
        color: #402725;
        margin-top: 8px;
      }

      @media screen and (max-width: 460px) {
        .scroll-hint {
          width: min(72px, 22vw);
          font-size: 38px;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <div class="topbar">
        <div class="topbar-nav">
          <a class="btn" href="index.html">Home</a>
        </div>

        <div class="text-size-controls">
        <button class="size-btn" data-size="small">A-</button>
        <button class="size-btn" data-size="medium">A</button>
        <button class="size-btn" data-size="large">A+</button>
      </div>

        <div id="status"></div>
        <div class="topbar-right">
          <a class="btn" href="/">Camera</a>
        </div>
      </div>

      <h1 id="homeTitle"><span id="autumn">Autumn Colors</span> <br />on the Que and Hua Mountains</h1>
      <p class="subtitle">
        Zhao Mengfu (1254–1322) <br />28.4 x 93.2 cm (National Palace Museum, Taipei)
      </p>

      <div class="scroll-inline" aria-label="Handscroll roadmap">
        <div class="scroll-roadmap-shell" id="scrollShell">
          <div class="scroll-hint left" role="button" tabindex="0" aria-label="Pan left">
            <span>‹</span>
          </div>
          <div class="scroll-hint right" role="button" tabindex="0" aria-label="Pan right">
            <span>›</span>
          </div>
          <div class="scroll-roadmap-viewport" id="scrollViewport">
            <div class="scroll-roadmap-track" id="scrollTrack">
              <img id="scrollImg" src="images/scroll.jpg" alt="Handscroll roadmap. Tap a seal to learn more." />
              <a
                class="stamp-hotspot"
                style="--hx: 29.83%; --hy: 27.54%"
                href="play.html?stamp=stamp3"
                title="Go to Stamp 3 tracing"
                ><span>1</span></a
              >
              <a
                class="stamp-hotspot"
                style="--hx: 3.10%; --hy: 33.52%"
                href="play.html?stamp=stamp4"
                title="Go to Stamp 4 tracing"
                ><span>2</span></a
              >
              <a
                class="stamp-hotspot"
                style="--hx: 7.19%; --hy: 93.73%"
                href="play.html?stamp=stamp2"
                title="Go to Stamp 2 tracing"
                ><span>3</span></a
              >
              <a
                class="stamp-hotspot"
                style="--hx: 82.84%; --hy: 26.34%"
                href="play.html?stamp=stamp5"
                title="Go to Stamp 5 tracing"
                ><span>4</span></a
              >
              <a
                class="stamp-hotspot"
                style="--hx: 26.50%; --hy: 4.87%"
                href="play.html?stamp=stamp1"
                title="Go to Stamp 1 tracing"
                ><span>5</span></a
              >
            </div>
          </div>
        </div>
      </div>

      <p class="scroll-inline-hint">
        Scroll from right to left. Tap a numbered seal to open its tracing page.
      </p>

      <script>
        ;(function () {
          const shell = document.getElementById('scrollShell')
          const viewport = document.getElementById('scrollViewport')
          const hintLeft = shell.querySelector('.scroll-hint.left')
          const hintRight = shell.querySelector('.scroll-hint.right')
          const trackImg = document.getElementById('scrollImg')

          const scrollToStartRTL = () => {
            // Right-to-left reading: start at the far RIGHT end.
            const max = viewport.scrollWidth - viewport.clientWidth
            viewport.scrollLeft = Math.max(0, max)
          }

          const initScroll = () => {
            requestAnimationFrame(() => {
              scrollToStartRTL()
              syncHints()
              requestAnimationFrame(syncHints)
            })
          }

          trackImg.addEventListener('load', () => {
            initScroll()
          })

          const panBy = (dir) => {
            const amount = Math.max(160, Math.floor(viewport.clientWidth * 0.6))
            viewport.scrollBy({ left: dir * amount, behavior: 'smooth' })
          }

          const syncHints = () => {
            const { scrollLeft, scrollWidth, clientWidth } = viewport
            const max = scrollWidth - clientWidth
            shell.classList.toggle('hint-left', scrollLeft > 6)
            shell.classList.toggle('hint-right', scrollLeft < max - 6)
          }

          // Initialize once on load (in case the image is already cached)
          if (trackImg.complete) initScroll()

          viewport.addEventListener('scroll', syncHints, { passive: true })
          hintLeft.addEventListener('click', () => {
            panBy(-1)
          })
          hintRight.addEventListener('click', () => {
            panBy(1)
          })
          hintLeft.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault()
              panBy(-1)
            }
          })
          hintRight.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault()
              panBy(1)
            }
          })
          window.addEventListener('resize', () => {
            syncHints()
          })

          window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
              e.preventDefault()
              panBy(-1)
            }
            if (e.key === 'ArrowRight') {
              e.preventDefault()
              panBy(1)
            }
          })
        })()
      </script>
    </main>
  </body>
</html>
