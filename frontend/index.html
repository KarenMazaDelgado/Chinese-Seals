<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link rel="stylesheet" href="https://use.typekit.net/lgd2ata.css">
    
    <title>Stamps</title>
    <style>
      ul{
        display:flex;
        list-style-type: none;
        justify-content: center;
      }
      li{
        padding:10px;
        margin: 10px;
      }

      img{
        margin-top: 15px;
        width:100%;
        height:auto;
      }

      #scrollBtn{
        all: unset;
        display: block;
        cursor: pointer;
      }

      #scrollModal{
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: none;
        background: rgba(0,0,0,0.9);
      }

      #scrollModal.open{
        display: block;
      }

      #scrollModal .close{
        position: absolute;
        top: 12px;
        right: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(255,255,255,0.12);
        color: #fff;
        font: 600 14px/1 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        cursor: pointer;
        user-select: none;
      }

      #scrollModal img{
        margin: 0;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        max-width: 96vw;
        max-height: 92vh;
        width: auto;
        height: auto;
      }

      .subtitle{
      margin:6px;
      }

      @media screen and (max-width: 460px) {
        ul{
          flex-direction: column;
          align-items: center;
        }

        li{
          padding:5px;
          margin:5px;
        }
      }


    </style>
  </head>
  <body>
    <main class="'wrap">
      <div class="topbar">
        <div class="topbar-nav">
          <a class="btn" href="index.html">Home</a>
        </div>
        <div id="status"></div>
        <div class="topbar-right">
          <a class="btn" href="/">Camera</a>
        </div>
      </div>

    <h1 id="homeTitle"><span id="autumn">Autumn Colors</span> <br>on the Que and Hua Mountains</h1>
    <p class="subtitle">Zhao Mengfu (1254–1322) <br>28.4 x 93.2 cm (National Palace Museum, Taipei)</p>

    <button id="scrollBtn" aria-label="Expand image">
      <img src="images/scroll.jpg" alt="Scroll image (tap to expand)">
    </button>

    <div id="scrollModal" role="dialog" aria-modal="true" aria-label="Expanded image">
      <div class="close" role="button" tabindex="0" aria-label="Close">Close</div>
      <img src="images/scroll.jpg" alt="Scroll image enlarged">
    </div>


    <ul>
      <li><a class="btn" href="play.html?stamp=stamp1">Stamp 1</a></li>
      <li><a class="btn" href="play.html?stamp=stamp2">Stamp 2</a></li>
      <li><a class="btn" href="play.html?stamp=stamp3">Stamp 3</a></li>
      <li><a class="btn" href="play.html?stamp=stamp4">Stamp 4</a></li>
      <li><a class="btn" href="play.html?stamp=stamp5">Stamp 5</a></li>
    </ul>

    <script>
      const btn = document.getElementById('scrollBtn')
      const modal = document.getElementById('scrollModal')
      const closeEl = modal.querySelector('.close')

      const open = () => modal.classList.add('open')
      const close = () => modal.classList.remove('open')

      btn.addEventListener('click', open)
      closeEl.addEventListener('click', close)
      modal.addEventListener('click', (e) => {
        if (e.target === modal) close()
      })
      window.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') close()
      })
    </script>
  </body>
</html>
