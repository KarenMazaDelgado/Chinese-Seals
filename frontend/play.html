<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Play Stamp</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link rel="stylesheet" href="https://use.typekit.net/lgd2ata.css">

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/addons/p5.sound.min.js"></script>
    <script
      src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js"
      type="module"
    ></script>
    <style>

      #p5_loading {
      display: none !important;
    }
      #sealName{
        font-family: "chantal", sans-serif;
        font-weight: 600;
        font-style: normal;
        font-size:var(--reading-font-size);
        color: #402725;
        margin-top:-10px;
      }

      #green{
        color:green;
      }

      #dot{
        width:15px;
        height: 15px;
        background-color:rgb(106, 158, 110);
        border-radius:100px;
        display:inline-block;
      }

      #path{
        color:rgb(184, 44, 39);
        text-decoration:underline;
        text-decoration-thickness: 0.2em;
         text-decoration-skip-ink: none;
        text-decoration-color:rgb(184, 44, 39);
      }

      #loading{
        text-align:center;
        font-family: "chantal", sans-serif;
        font-weight: 600;
        font-style: normal;
        font-size:var(--reading-font-size);
      }
    </style>
    
  </head>
  <body>
    <main class="wrap">
      <div class="topbar">
        <div class="topbar-nav">
          <a class="btn" href="index.html">Home</a>
        </div>

          <div class="text-size-controls">
        <!-- <h4>Text Size:</h4> -->
        <button class="size-btn" data-size="small">A-</button>
        <button class="size-btn" data-size="medium">A</button>
        <button class="size-btn" data-size="large">A+</button>
      </div>

        <div id="status"></div>
        <div class="topbar-right">
          <a class="btn" href="/">Camera</a>
        </div>
      </div>

      <div class="content">
        <h1 id ="traceTitle">Trace the Seal</h1>
        <div id="sealName"></div>
        <br>
        <p class="subtitle">Start at the <span id="green">filled green dot</span>   <span id="dot"></span> and follow the <span id="path">red path</span> to trace the seal!</p>
        <div id="canvasWrap">
          <div id="loadingScreen">
        <dotlottie-wc
          src="https://lottie.host/45c27a83-e243-4525-b16d-c7cc7bcde5da/sV6alHE1d2.lottie"
          style="width: 300px;height: 300px"
          autoplay
          loop
        ></dotlottie-wc>  
        <p id="loading">Loading...</p>
  </div>
        </div>
      </div>

      <div class="bottom-actions">
        <button class="btn" id="restartBtn" type="button">Restart</button>
        <a class="btn" id="learnMoreLink" href="#">Learn More</a>
      </div>
    </main>

    <script src="sketch.js"></script>
    <script>
      document.getElementById("restartBtn").addEventListener("click", () => {
        window.location.reload();
      });

      const params = new URLSearchParams(window.location.search);
      stampId = params.get("stamp") || "stamp1";
      document.getElementById("learnMoreLink").href = `learn/${stampId}.html`;

    </script>
    <script src="learn/fontsize.js"></script>
  </body>
</html>
