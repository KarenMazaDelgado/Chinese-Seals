<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Play Stamp</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link rel="stylesheet" href="https://use.typekit.net/lgd2ata.css">

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/addons/p5.sound.min.js"></script>
    <script
      src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.9.10/dist/dotlottie-wc.js"
      type="module"
    ></script>
    <style>
      
      #celebrationShell #traceTitle,
      #celebrationShell #traceSubtitle {
        width: 100%;
        max-width: 100%;
        text-align: center;
      }

      #playStage #sealName {
        font-family: "chantal", sans-serif;
        font-weight: 600;
        font-style: normal;
        font-size: 1.2em;
        color: #402725;
        margin-top: 4px;
        margin-bottom: 0;
        width: 100%;
        max-width: 100%;
        text-align: center;
        align-self: stretch;
      }

      /* Seal line hidden on completion, replaces title + hint + seal name */
      #celebrationShell.celebration-active #sealName {
        display: none;
      }

      #playStage #canvasWrap {
        margin-top: 4px;
        margin-bottom: 12px;
        position: relative;
      }

      #loadingScreen {
        position: absolute;
        inset: 0;
        z-index: 2;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        background-color: rgba(229, 217, 199, 0.92);
        border-radius: 8px;
      }

      #loading {
        text-align: center;
        font-family: "chantal", sans-serif;
        font-weight: 600;
        font-style: normal;
        font-size: var(--reading-font-size);
        color: #402725;
        margin: 0;
      }

      #p5_loading {
        display: none !important;
      }

      /* Completion overlay */
      #completionOverlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: none;
        align-items: flex-start;
        justify-content: center;
        padding: 14px 14px 18px;
        background: transparent;
        pointer-events: none; /* don't block the finished stamp */
      }

      #completionOverlay.show {
        display: flex;
      }

      /* Dim everything except seal*/
      #completionOverlay .completion-vignette {
        position: fixed;
        pointer-events: none;
        z-index: 0;
        box-sizing: border-box;
        background: transparent;
        /* spread dim + glow on the finished stamp */
        box-shadow:
          0 0 0 9999px rgba(64, 39, 37, 0.4),
          0 0 28px 6px rgba(245, 230, 211, 0.55),
          0 0 52px 18px rgba(184, 44, 39, 0.22);
      }

      /* Group completion title + subtitle */
      #celebrationShell {
        display: flex;
        flex-direction: column;
        align-items: center;
        max-width: min(560px, 100%);
        width: 100%;
      }

      #celebrationShell.celebration-active {
        background-color: #e5d9c7;
        background-image: url(bkgd.png);
        background-size: 60%;
        background-repeat: repeat;
        padding: clamp(16px, 4vw, 24px) clamp(18px, 5vw, 28px);
        margin-bottom: 4px;
        border: none;
        outline: none;
        border-radius: 14px;
        box-sizing: border-box;
      }

     
      #traceTitle.trace-complete {
        display: block;
        text-align: center;
        margin: 0;
        padding: 0;
        line-height: 1.15;
        letter-spacing: normal;
      }

      #traceTitle.trace-complete .ch {
        display: inline-block;
        will-change: transform;
        animation: letterJump 800ms ease-in-out infinite;
        animation-delay: calc(var(--i) * 72ms);
      }

      @keyframes letterJump {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }

      #traceSubtitle.trace-complete-sub {
        margin-top: 6px;
        margin-bottom: 0;
        text-align: center;
      }

      #traceSubtitle .dots {
        display: inline-block;
        width: 1.6em;
        text-align: left;
      }

      #traceSubtitle .dots::after {
        content: "";
        animation: dots 1.1s steps(4, end) infinite;
      }

      @keyframes dots {
        0% { content: ""; }
        25% { content: "."; }
        50% { content: ".."; }
        75% { content: "..."; }
        100% { content: ""; }
      }
    </style>
    
  </head>
  <body>
    <main class="wrap">
      <div class="topbar">
        <div class="topbar-nav">
          <a class="btn" href="index.html">Home</a>
        </div>

          <div class="text-size-controls">
        <!-- <h4>Text Size:</h4> -->
        <button class="size-btn" data-size="small">A-</button>
        <button class="size-btn" data-size="medium">A</button>
        <button class="size-btn" data-size="large">A+</button>
      </div>

        <div id="status"></div>
        <div class="topbar-right">
          <a class="btn" href="/">Camera</a>
        </div>
      </div>

      <div class="content">
        <div id="playStage">
          <div id="celebrationShell">
            <h1 id="traceTitle">Trace the Seal</h1>
            <p id="traceSubtitle" class="subtitle">
              Start at the filled green dot and follow the fading path to trace the seal!
            </p>
            <div id="sealName"></div>
          </div>
          <div id="canvasWrap">
            <div id="loadingScreen">
              <dotlottie-wc
                src="https://lottie.host/45c27a83-e243-4525-b16d-c7cc7bcde5da/sV6alHE1d2.lottie"
                style="width: 300px; height: 300px"
                autoplay
                loop
              ></dotlottie-wc>
              <p id="loading">Loading...</p>
            </div>
          </div>
        </div>
      </div>

      <div class="bottom-actions">
        <button class="btn" id="restartBtn" type="button">Restart</button>
        <a class="btn" id="learnMoreLink" href="#">Learn More</a>
      </div>
    </main>

    <div id="completionOverlay" aria-live="polite" aria-label="Completion message">
      <div class="completion-vignette" aria-hidden="true"></div>
    </div>

    <script src="sketch.js"></script>
    <script>
      document.getElementById("restartBtn").addEventListener("click", () => {
        window.location.reload();
      });

      const params = new URLSearchParams(window.location.search);
      stampId = params.get("stamp") || "stamp1";
      document.getElementById("learnMoreLink").href = `learn/${stampId}.html`;

    </script>
    <script src="learn/fontsize.js"></script>
  </body>
</html>
