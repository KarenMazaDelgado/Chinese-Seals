<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Play Stamp</title>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <link rel="stylesheet" href="https://use.typekit.net/lgd2ata.css">

    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/addons/p5.sound.min.js"></script>
    <style>
      #sealName{
        font-family: "chantal", sans-serif;
        font-weight: 600;
        font-style: normal;
        font-size:1.2em;
        color: #402725;
      }
    </style>
    
  </head>
  <body>
    <main class="wrap">
      <div class="topbar">
        <div class="topbar-nav">
          <a class="btn" href="index.html">Home</a>
        </div>
        <div id="status"></div>
        <div class="topbar-right">
          <a class="btn" href="/">Camera</a>
        </div>
      </div>

      <div class="content">
        <h1 id ="traceTitle">Trace the Seal</h1>
        <p class="subtitle">Start at the filled green dot and follow the fading path to trace the seal!</p>
        <div id="sealName"></div>
        <div id="canvasWrap"></div>
      </div>

      <div class="bottom-actions">
        <button class="btn" id="restartBtn" type="button">Restart</button>
        <a class="btn" id="learnMoreLink" href="#">Learn More</a>
      </div>
    </main>

    <script src="sketch.js"></script>
    <script>
      document.getElementById("restartBtn").addEventListener("click", () => {
        window.location.reload();
      });

      const params = new URLSearchParams(window.location.search);
      stampId = params.get("stamp") || "stamp1";
      document.getElementById("learnMoreLink").href = `learn/${stampId}.html`;

    </script>
  </body>
</html>
